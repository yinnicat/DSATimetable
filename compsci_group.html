  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    * { -webkit-tap-highlight-color: transparent; }
    body { overscroll-behavior: none; }
    ::-webkit-scrollbar { height: 8px; }
    ::-webkit-scrollbar-track { background: #1f2937; }
    ::-webkit-scrollbar-thumb { background: #4b5563; border-radius: 4px; }
  </style>
</head>
<body class="bg-gray-900">
  <div id="root"></div>
  <script type="text/babel">
    const { useState } = React;

    const schedules = {
      // Ahmed (was Molisha) — colourful visual calendar
      "Ahmed": {
        color: "#f59e0b",
        classes: [
          { day: "Monday",    start: "08:00", end: "12:00", name: "COMP 301 LAB (IO LAB)" },
          { day: "Monday",    start: "11:00", end: "13:30", name: "GEM 232 LEC (Block 12/055-006)" },
          { day: "Monday",    start: "14:00", end: "17:30", name: "COMP 321 LAB (Block 115/022)" },
          { day: "Tuesday",   start: "09:00", end: "10:50", name: "COMP 301 LEC (Block 125/085-006)" },
          { day: "Tuesday",   start: "12:00", end: "13:50", name: "COMP 322 LEC (Bio seminar)" },
          { day: "Tuesday",   start: "15:00", end: "17:50", name: "COMP 302 LAB (Block 115/024)" },
          { day: "Tuesday",   start: "18:00", end: "19:00", name: "CHCL 102 (Block 115/024)" },
          { day: "Wednesday", start: "08:00", end: "11:50", name: "COMP 322 LAB (Block 115/001)" },
          { day: "Wednesday", start: "14:00", end: "17:50", name: "COMP 302 LEC (Block 115/024)" },
          { day: "Wednesday", start: "16:00", end: "17:50", name: "COMP 321 LEC (Bio seminar)" },
          { day: "Thursday",  start: "08:00", end: "09:50", name: "COMP 302 LEC (Bio semp lab)" },
          { day: "Thursday",  start: "18:00", end: "19:00", name: "CHCL 102 (Block 115/024)" },
        ]
      },

      // Senatla — dark text list (GEME 323 + COMP 341)
      "Senatla": {
        color: "#22c55e",
        classes: [
          { day: "Monday",    start: "08:00", end: "10:50", name: "COMP 301 LAB" },
          { day: "Monday",    start: "11:00", end: "12:50", name: "GEME 323 LEC" },
          { day: "Monday",    start: "13:00", end: "15:50", name: "COMP 321 LAB" },
          { day: "Tuesday",   start: "08:00", end: "09:50", name: "COMP 301 LEC" },
          { day: "Tuesday",   start: "12:00", end: "13:50", name: "COMP 322 LEC" },
          { day: "Tuesday",   start: "15:00", end: "17:50", name: "COMP 302 LAB" },
          { day: "Wednesday", start: "08:00", end: "10:50", name: "COMP 322 LAB" },
          { day: "Wednesday", start: "14:00", end: "15:50", name: "COMP 352 LEC" },
          { day: "Wednesday", start: "16:00", end: "17:50", name: "COMP 321 LEC" },
          { day: "Thursday",  start: "08:00", end: "09:50", name: "COMP 302 LEC" },
          { day: "Thursday",  start: "13:00", end: "14:50", name: "COMP 341 LEC" },
          { day: "Friday",    start: "12:00", end: "14:50", name: "COMP 341 LAB" },
        ]
      },

      // Abygail — Excel spreadsheet grid
      "Abygail": {
        color: "#3b82f6",
        classes: [
          { day: "Monday",    start: "08:00", end: "10:50", name: "COMP 301 LAB (3D LAB)" },
          { day: "Monday",    start: "11:00", end: "12:50", name: "GEME 323 LEC (125/005-006)" },
          { day: "Monday",    start: "14:00", end: "15:50", name: "COMP 321 LAB (115/002)" },
          { day: "Tuesday",   start: "08:00", end: "09:50", name: "COMP 301 LEC (125/005-006)" },
          { day: "Tuesday",   start: "12:00", end: "13:50", name: "COMP 322 LEC (Bio SEM)" },
          { day: "Tuesday",   start: "16:00", end: "17:50", name: "COMP 302 LAB (115/001)" },
          { day: "Wednesday", start: "08:00", end: "09:50", name: "COMP 322 LAB (115/001)" },
          { day: "Wednesday", start: "14:00", end: "15:50", name: "COMP 352 LEC (Bio SEM)" },
          { day: "Wednesday", start: "16:00", end: "17:50", name: "COMP 321 LEC (Bio SEM)" },
          { day: "Thursday",  start: "08:00", end: "09:50", name: "COMP 302 LEC (Bio COMP LAB)" },
        ]
      },

      // Onneile — dark grid (COMP 232 + COMP 352 optional)
      "Onneile": {
        color: "#ec4899",
        classes: [
          { day: "Monday",    start: "11:00", end: "11:50", name: "GEME 323 LEC" },
          { day: "Monday",    start: "13:00", end: "15:50", name: "COMP 321 LAB" },
          { day: "Tuesday",   start: "12:00", end: "12:50", name: "COMP 322 LEC" },
          { day: "Tuesday",   start: "15:00", end: "17:50", name: "COMP 302 LAB" },
          { day: "Wednesday", start: "08:00", end: "10:50", name: "COMP 322 LAB" },
          { day: "Wednesday", start: "10:00", end: "10:50", name: "COMP 232 LEC" },
          { day: "Wednesday", start: "14:00", end: "15:50", name: "COMP 352 LEC (Optional)" },
          { day: "Wednesday", start: "16:00", end: "16:50", name: "COMP 321 LEC" },
          { day: "Thursday",  start: "08:00", end: "09:50", name: "COMP 302 LEC" },
          { day: "Thursday",  start: "12:00", end: "13:50", name: "COMP 232 LAB" },
        ]
      },

      // Motheo — INFS + COMP 232 LAB
      "Motheo": {
        color: "#8b5cf6",
        classes: [
          { day: "Monday",    start: "11:00", end: "12:00", name: "GEME 323 LEC" },
          { day: "Monday",    start: "13:00", end: "14:00", name: "COMP 321 LAB" },
          { day: "Tuesday",   start: "08:00", end: "10:00", name: "INFS LEC (Physics Seminar Room)" },
          { day: "Tuesday",   start: "11:00", end: "14:00", name: "INFS 221 LAB (115/001)" },
          { day: "Tuesday",   start: "15:00", end: "16:00", name: "COMP 302 LAB" },
          { day: "Tuesday",   start: "16:00", end: "18:00", name: "INFS 221 LEC (Physics Seminar Room)" },
          { day: "Wednesday", start: "08:00", end: "11:00", name: "COMP 322 LAB" },
          { day: "Wednesday", start: "14:00", end: "15:00", name: "COMP 352 LEC (Optional)" },
          { day: "Wednesday", start: "16:00", end: "17:00", name: "COMP 321 LEC" },
          { day: "Thursday",  start: "08:00", end: "09:00", name: "COMP 302 LEC" },
          { day: "Thursday",  start: "12:00", end: "13:00", name: "COMP 232 LAB" },
          { day: "Friday",    start: "08:00", end: "10:00", name: "INFS 462 LAB (115/002)" },
        ]
      },

      // Sean — COMP 301 + INFS 302
      "Sean": {
        color: "#06b6d4",
        classes: [
          { day: "Monday",    start: "08:00", end: "11:00", name: "COMP 301 LAB (3D LAB)" },
          { day: "Monday",    start: "11:00", end: "12:00", name: "GEME 323 LEC (125/005-006)" },
          { day: "Monday",    start: "16:00", end: "18:00", name: "INFS 302 LAB (115/001)" },
          { day: "Tuesday",   start: "08:00", end: "10:00", name: "COMP 301 LEC (125/005-006)" },
          { day: "Tuesday",   start: "12:00", end: "14:00", name: "COMP 322 LEC (Bio Sem)" },
          { day: "Tuesday",   start: "15:00", end: "18:00", name: "COMP 302 LAB (115/001)" },
          { day: "Wednesday", start: "08:00", end: "11:00", name: "COMP 322 LAB (115/001)" },
          { day: "Wednesday", start: "11:00", end: "13:00", name: "INFS 302 LEC (Phys Comp Lab)" },
          { day: "Wednesday", start: "14:00", end: "16:00", name: "COMP 352 LEC (Env Sem)" },
          { day: "Thursday",  start: "08:00", end: "10:00", name: "COMP 302 LEC (Bio Comp Lab)" },
        ]
      },

      // Malau — new addition
      "Malau": {
        color: "#f97316",
        classes: [
          { day: "Monday",    start: "11:00", end: "13:00", name: "GEME 323 LEC" },
          { day: "Monday",    start: "13:00", end: "15:00", name: "COMP 321 LAB" },
          { day: "Tuesday",   start: "08:00", end: "10:00", name: "INFS 462 LEC" },
          { day: "Tuesday",   start: "12:00", end: "14:00", name: "COMP 322 LEC" },
          { day: "Tuesday",   start: "15:00", end: "18:00", name: "COMP 302 LAB" },
          { day: "Wednesday", start: "08:00", end: "11:00", name: "COMP 322 LAB" },
          { day: "Wednesday", start: "10:00", end: "12:00", name: "COMP 232 LEC" },
          { day: "Wednesday", start: "16:00", end: "18:00", name: "COMP 321 LEC" },
          { day: "Thursday",  start: "08:00", end: "10:00", name: "COMP 302 LEC" },
          { day: "Thursday",  start: "12:00", end: "13:00", name: "COMP 232 LAB" },
          { day: "Friday",    start: "08:00", end: "10:00", name: "INFS 462 LAB" },
        ]
      },
    };

    const days = ["Monday", "Tuesday", "Wednesday", "Thursday", "Friday"];
    const timeSlots = [];
    for (let h = 8; h <= 18; h++) {
      timeSlots.push(`${h.toString().padStart(2, '0')}:00`);
    }

    const parseTime = (timeStr) => {
      const [hours, mins] = timeStr.split(':').map(Number);
      return hours + mins / 60;
    };

    function App() {
      const [selected, setSelected] = useState(
        Object.fromEntries(Object.keys(schedules).map(k => [k, true]))
      );
      const [showFreeOnly, setShowFreeOnly] = useState(false);

      const toggleSchedule = (name) => {
        setSelected(prev => ({ ...prev, [name]: !prev[name] }));
      };

      const selectAll = () => {
        setSelected(Object.fromEntries(Object.keys(schedules).map(k => [k, true])));
      };

      const clearAll = () => {
        setSelected(Object.fromEntries(Object.keys(schedules).map(k => [k, false])));
      };

      const getClassesForSlot = (day, hour) => {
        const classes = [];
        Object.entries(schedules).forEach(([name, schedule]) => {
          if (!selected[name]) return;
          schedule.classes.forEach(cls => {
            if (cls.day === day) {
              const startHour = parseTime(cls.start);
              const endHour = parseTime(cls.end);
              if (hour >= startHour && hour < endHour) {
                classes.push({ ...cls, scheduleName: name, color: schedule.color });
              }
            }
          });
        });
        return classes;
      };

      const isFreeSlot = (day, hour) => {
        const activeSchedules = Object.entries(schedules).filter(([name]) => selected[name]);
        if (activeSchedules.length === 0) return false;
        return activeSchedules.every(([name, schedule]) => {
          return !schedule.classes.some(cls => {
            if (cls.day !== day) return false;
            const startHour = parseTime(cls.start);
            const endHour = parseTime(cls.end);
            return hour >= startHour && hour < endHour;
          });
        });
      };

      const selectedCount = Object.values(selected).filter(Boolean).length;

      return (
        <div className="min-h-screen bg-gray-900 text-white p-4">
          <div className="max-w-7xl mx-auto">
            <h1 className="text-2xl font-bold text-center mb-2">
              📅 CS Group Availability Finder
            </h1>
            <p className="text-gray-400 text-center mb-4 text-sm">
              Toggle schedules to find when everyone is free
            </p>

            {/* Controls */}
            <div className="bg-gray-800 rounded-lg p-4 mb-4">
              <div className="flex flex-wrap items-center gap-2 mb-3">
                <span className="text-sm text-gray-400">Quick:</span>
                <button onClick={selectAll} className="px-3 py-1 bg-blue-600 hover:bg-blue-700 rounded text-sm">
                  Select All
                </button>
                <button onClick={clearAll} className="px-3 py-1 bg-gray-600 hover:bg-gray-700 rounded text-sm">
                  Clear All
                </button>
                <label className="flex items-center gap-2 ml-4 cursor-pointer">
                  <input
                    type="checkbox"
                    checked={showFreeOnly}
                    onChange={(e) => setShowFreeOnly(e.target.checked)}
                    className="w-4 h-4 rounded"
                  />
                  <span className="text-sm">Highlight free slots only</span>
                </label>
              </div>

              <div className="flex flex-wrap gap-2">
                {Object.entries(schedules).map(([name, schedule]) => (
                  <button
                    key={name}
                    onClick={() => toggleSchedule(name)}
                    className={`px-3 py-2 rounded-lg text-sm font-medium transition-all ${
                      selected[name] ? 'ring-2 ring-white' : 'opacity-40'
                    }`}
                    style={{
                      backgroundColor: selected[name] ? schedule.color : '#374151',
                      color: selected[name] ? 'white' : '#9CA3AF'
                    }}
                  >
                    {name}
                  </button>
                ))}
              </div>

              <p className="text-sm text-gray-400 mt-3">
                {selectedCount} schedule{selectedCount !== 1 ? 's' : ''} selected
                {selectedCount > 1 && (
                  <span className="ml-2 text-green-400">• Green slots = everyone is free</span>
                )}
              </p>
            </div>

            {/* Timetable Grid */}
            <div className="overflow-x-auto">
              <div className="min-w-[800px]">
                <div className="grid grid-cols-6 gap-1 mb-1">
                  <div className="bg-gray-800 p-2 text-center text-sm font-semibold rounded">Time</div>
                  {days.map(day => (
                    <div key={day} className="bg-gray-800 p-2 text-center text-sm font-semibold rounded">{day}</div>
                  ))}
                </div>

                {timeSlots.map((time) => {
                  const hour = parseInt(time);
                  return (
                    <div key={time} className="grid grid-cols-6 gap-1 mb-1">
                      <div className="bg-gray-800 p-2 text-center text-xs rounded flex items-center justify-center">
                        {time} - {(hour + 1).toString().padStart(2, '0')}:00
                      </div>
                      {days.map(day => {
                        const classes = getClassesForSlot(day, hour);
                        const isFree = isFreeSlot(day, hour);
                        const hasSelected = selectedCount > 0;

                        if (showFreeOnly) {
                          return (
                            <div
                              key={day}
                              className={`p-2 rounded min-h-[50px] flex items-center justify-center ${
                                hasSelected && isFree
                                  ? 'bg-green-600'
                                  : hasSelected && classes.length > 0
                                  ? 'bg-red-900/50'
                                  : 'bg-gray-800'
                              }`}
                            >
                              {hasSelected && isFree && <span className="text-xs font-semibold">FREE</span>}
                              {hasSelected && !isFree && classes.length > 0 && (
                                <span className="text-xs text-red-300">{classes.length} busy</span>
                              )}
                            </div>
                          );
                        }

                        return (
                          <div
                            key={day}
                            className={`p-1 rounded min-h-[50px] ${
                              hasSelected && isFree && selectedCount > 1
                                ? 'bg-green-600/30 ring-1 ring-green-500'
                                : classes.length > 0
                                ? 'bg-gray-700'
                                : 'bg-gray-800'
                            }`}
                          >
                            {classes.length > 0 ? (
                              <div className="space-y-1">
                                {classes.slice(0, 2).map((cls, i) => (
                                  <div
                                    key={i}
                                    className="text-xs p-1 rounded truncate"
                                    style={{ backgroundColor: cls.color + '99' }}
                                    title={`${cls.scheduleName}: ${cls.name}`}
                                  >
                                    <span className="font-semibold">{cls.name.split(' ').slice(0,2).join(' ')}</span>
                                  </div>
                                ))}
                                {classes.length > 2 && (
                                  <div className="text-xs text-gray-400 text-center">+{classes.length - 2} more</div>
                                )}
                              </div>
                            ) : hasSelected && isFree && selectedCount > 1 ? (
                              <div className="flex items-center justify-center h-full">
                                <span className="text-xs text-green-400 font-semibold">✓ FREE</span>
                              </div>
                            ) : null}
                          </div>
                        );
                      })}
                    </div>
                  );
                })}
              </div>
            </div>

            {/* Legend */}
            <div className="mt-4 bg-gray-800 rounded-lg p-4">
              <h3 className="font-semibold mb-2 text-sm">Legend</h3>
              <div className="flex flex-wrap gap-4 text-xs">
                {Object.entries(schedules).map(([name, schedule]) => (
                  <div key={name} className="flex items-center gap-2">
                    <div className="w-4 h-4 rounded" style={{ backgroundColor: schedule.color }} />
                    <span>{name}</span>
                  </div>
                ))}
                <div className="flex items-center gap-2">
                  <div className="w-4 h-4 rounded bg-green-600" />
                  <span>Everyone Free</span>
                </div>
              </div>
            </div>

            <p className="text-center text-gray-500 text-xs mt-4">
              BIUST Semester 2 • 2025/2026
            </p>
          </div>
        </div>
      );
    }

    ReactDOM.render(<App />, document.getElementById('root'));
  </script>
</body>
</html>
